        <!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Hospital Management</title>
        <link rel="stylesheet" href="style.css">
        <style>
            body{
                background: #b6e0f5;
                opacity: 100%;
            }
            .pr{
                width: 70%;
                height: 60%;
                margin: 50px auto;
                padding: 30px;
                background: white;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0,0,0,0.2);
            }
            .pr h2{
                color: #2c7be5;
                margin-bottom: 15px;
            }
            textarea{
                width: 100%;
                height: 90%;
                border: 2;
                border-color: black;
            }
          
        </style>
        <script>
            function cl(){
                alert("Thank You For Your Feedback");
                document.getElementById("clearform").reset();
            }
        </script>
    </head>
    <body>
        <form id="clearform">
        <center>
            <br><br><br>
            <u><h1>Your Feedbacks</h1></u>
<section class="pr">
    <h2>Hospital Management System</h2>
    <textarea placeholder="Write All Your Feedback Here"></textarea>
    <br><br><br>
<button onclick="cl()">Submit Feedback</button>
</section>
        </center>
        </form>
     </body>
</html>
